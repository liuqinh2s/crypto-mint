name: Analyze token

on:
  workflow_dispatch:
    inputs:
      token:
        description: Token symbol, for example SYN
        required: true
        type: string
      exchange:
        description: Optional exchange hint
        required: false
        default: binance
        type: string

permissions:
  contents: write

concurrency:
  group: analyze-token-${{ github.event.inputs.token }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Analyze token
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/analyze-token.mjs "${{ github.event.inputs.token }}" "${{ github.event.inputs.exchange }}"

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Analyze ${{ github.event.inputs.token }}"
            git push
          fi
